<!-- MOOD -->
<section id="mood" class="section">

<h2>Select Your Mood</h2>

<div class="card-list">

<div class="card" onclick="playVideo('tired')">😴 Tired</div>
<div class="card" onclick="playVideo('motivated')">😎 Motivated</div>
<div class="card" onclick="playVideo('stress')">😣 Stress</div>
<div class="card" onclick="playVideo('focus')">🎯 Focus</div>
<div class="card" onclick="playVideo('lazy')">😵 Lazy</div>

</div>

<div id="video"></div>

<p id="aiText">Click below to detect mood</p>
<p id="result"></p>

<button onclick="detectMood()" class="detect-btn">
📷 Detect Mood
</button>

<div class="media-box">

<video id="camera" autoplay muted playsinline></video>

<iframe id="ytVideo"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

<div id="loader" style="display:none;">
🤖 Analyzing Mood...
</div>

</section>

<div id="aiRecommend" class="recommend-box">
AI Recommendation will appear here
</div>

<!-- STUDY -->
<section id="study" class="section">

<h2>Study Planner</h2>

<div class="goal-row">
<input type="text" id="goal" placeholder="Enter today's goal">
<button onclick="saveGoal()">Save Goal</button>
</div>

<h2 id="timer">25:00</h2>

<div class="btn-row">
<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="playMusic()">🎵 Music</button>
</div>

<p id="goalText"></p>

</section>

<!-- PROGRESS -->
<section id="progress" class="section">

<h2>Today's Progress</h2>

<button onclick="updateProgress()">
Mark Study Done
</button>

<p id="progressText">
No progress yet
</p>

</section>

<footer class="footer">
<p>© 2026 Mood Learning</p>
</footer>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
<script defer src="script.js"></script>

</body>
</html>
